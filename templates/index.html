<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Irminsul Lore Explorer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body class="irminsul-theme">

    <div class="ley-line-overlay"></div>

    <div class="container py-5 content-wrapper">
        <header class="text-center mb-5">
            <h1 class="title-glow">The Irminsul Archives</h1>
            <p class="subtitle">Query the Ley Lines of Teyvat</p>
        </header>
        
        <div class="row justify-content-center mb-4">
            <div class="col-md-10">
                <div class="search-container d-flex gap-3">
                    <input type="text" id="queryInput" class="form-control custom-input" placeholder="Ask the tree... (e.g., What happened to Durin?)">
                    <button class="custom-btn" onclick="askQuestion()" id="askBtn">
                        <span id="btnText">Connect</span>
                        <div class="ley-line-spinner" id="loadingSpinner"></div>
                    </button>
                </div>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-10">
                <div id="answerBox" class="glass-panel text-answer"></div>
            </div>
        </div>

        <div class="row justify-content-center mt-4">
            <div class="col-md-10">
                <div id="network" class="glass-panel graph-container"></div>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
